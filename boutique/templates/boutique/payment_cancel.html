{% extends "base.html" %}
{% block content %}
<div class="max-w-xl mx-auto text-center py-16">
  <div class="text-6xl mb-4">❌</div>
  <h1 class="text-3xl font-bold mb-2">Payment Cancelled</h1>
  <p class="text-gray-500 mb-6">Order #{{ order.id }} was not charged.</p>
  <a href="{% url 'boutique:checkout' %}" class="bg-black text-white px-8 py-3 rounded-full mr-3">
    Try Again
  </a>
  <a href="{% url 'boutique:landing' %}" class="border border-black px-8 py-3 rounded-full">
    Go Home
  </a>
</div>
{% endblock %}
